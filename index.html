<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍰 Сладкая мастерская</title>
<style>
  body { margin:0; font-family:'Comic Sans MS','Segoe UI',sans-serif;
    background:linear-gradient(135deg,#FFD1DC,#B5EAD7,#FFF5BA);
    display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
  .card { background:#fff; border-radius:30px; box-shadow:0 10px 30px rgba(0,0,0,.15);
    padding:30px; max-width:560px; width:100%; text-align:center; }
  h1 { color:#ff7aa2; font-size:28px; }
  .chef { font-size:60px; }
  .question { font-size:22px; margin:20px 0; color:#444; }
  .options button { display:block; width:100%; margin:10px 0; padding:16px; font-size:20px;
    border:none; border-radius:20px; background:#B5EAD7; cursor:pointer; transition:.2s; font-family:inherit; }
  .options button:hover { transform:scale(1.05); background:#9be0c4; }
  .feedback { font-size:20px; margin:15px 0; min-height:28px; color:#ff7aa2; }
  .start-btn,.again-btn { padding:16px 30px; font-size:22px; border:none; border-radius:25px;
    background:#ff9ec3; color:#fff; cursor:pointer; font-family:inherit; margin-top:15px; }
  .progress { font-size:18px; color:#888; }
  .sound-btn { background:#FFF5BA; border:none; border-radius:15px; padding:8px 14px;
    font-size:18px; cursor:pointer; margin-top:10px; font-family:inherit; }
  @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
  .pop { display:inline-block; animation:pop .5s ease; }
  .pantry { display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin:20px 0; min-height:60px; }
  .ingredient { font-size:44px; cursor:grab; user-select:none; transition:transform .15s; padding:6px; border-radius:15px; }
  .ingredient:active { cursor:grabbing; }
  .ingredient.taken { opacity:.25; pointer-events:none; }
  .plate { width:220px; height:220px; margin:20px auto; border-radius:50%;
    background:radial-gradient(circle,#fff 60%,#eee 100%);
    border:6px dashed #ffb3c9; display:flex; flex-wrap:wrap; justify-content:center; align-items:center;
    gap:4px; padding:10px; box-shadow:inset 0 4px 12px rgba(0,0,0,.08); transition:.2s; }
  .plate.over { border-color:#ff7aa2; transform:scale(1.05); }
  .plate .ingredient { font-size:40px; cursor:default; animation:pop .4s ease; }
  .hint-text { font-size:16px; color:#999; margin-top:8px; }
</style>
</head>
<body>
<div class="card">
  <div class="chef">👨‍🍳</div>
  <h1>Сладкая мастерская</h1>
  <div id="screen"></div>
</div>

<script>
const DATA = {
  desserts: ["Радужный торт 🍰","Волшебное мороженое 🍦","Весёлый кекс 🧁","Фруктовый коктейль 🥤","Сладкие вафли 🧇"],
  praise: ["Ура! Верно! Держи ингредиент!","Ты умница! Дзинь-дзинь!","Отлично! Как вкусно!","Правильно! Как красиво!","Вот это да! Ты волшебник!"],
  hints: ["Почти! Попробуй ещё разок","Ты близко! Подумай ещё чуть-чуть","Не переживай, попробуем вместе"],
  questions: [
    {q:"Кто спит зимой в берлоге?",o:["Медведь","Заяц","Лиса"],c:"Медведь",i:"🍓"},
    {q:"Кто даёт нам молоко?",o:["Корова","Курица","Рыбка"],c:"Корова",i:"🍫"},
    {q:"Что растёт под землёй?",o:["Морковка","Яблоко","Груша"],c:"Морковка",i:"🥝"},
    {q:"Кто говорит «Мяу»?",o:["Кошка","Собака","Утка"],c:"Кошка",i:"🍯"},
    {q:"У кого иголки на спинке?",o:["Ёжик","Заяц","Волк"],c:"Ёжик",i:"🍒"},
    {q:"Какого цвета солнышко?",o:["Жёлтое","Синее","Чёрное"],c:"Жёлтое",i:"🍦"},
    {q:"Какого цвета трава?",o:["Зелёная","Красная","Белая"],c:"Зелёная",i:"🫐"},
    {q:"Сколько лап у котика?",o:["4","2","6"],c:"4",i:"🥥"},
    {q:"На что похоже колесо?",o:["Круг","Квадрат","Треугольник"],c:"Круг",i:"🧁"},
    {q:"Сколько будет 1 плюс 1?",o:["2","3","1"],c:"2",i:"🍌"},
    {q:"Что нужно сказать за подарок?",o:["Спасибо","Пока","Ничего"],c:"Спасибо",i:"🌈"},
    {q:"Кто тянул репку первым?",o:["Дедка","Мышка","Внучка"],c:"Дедка",i:"🍓"},
    {q:"Что кислое?",o:["Лимон","Конфета","Мёд"],c:"Лимон",i:"🍫"},
    {q:"Что холодное?",o:["Мороженое","Чай","Суп"],c:"Мороженое",i:"🥝"},
    {q:"Где растут яблоки?",o:["На дереве","В море","Под землёй"],c:"На дереве",i:"🍎"},
    {q:"У кого длинная шея?",o:["Жираф","Кот","Ёжик"],c:"Жираф",i:"🍯"},
    {q:"Кто царь зверей?",o:["Лев","Заяц","Мышь"],c:"Лев",i:"🍒"},
    {q:"Какая птица не летает?",o:["Пингвин","Воробей","Ласточка"],c:"Пингвин",i:"🫐"},
    {q:"Кто превращается из гусеницы?",o:["Бабочка","Пчела","Муха"],c:"Бабочка",i:"🌈"},
    {q:"Сколько дней в неделе?",o:["7","5","10"],c:"7",i:"🧁"},
    {q:"Какая фигура у крыши домика?",o:["Треугольник","Круг","Овал"],c:"Треугольник",i:"🍦"},
    {q:"Сколько пальцев на руке?",o:["5","4","6"],c:"5",i:"🥭"},
    {q:"Кто помогал Золушке?",o:["Фея","Дракон","Робот"],c:"Фея",i:"🍑"},
    {q:"Как мычит корова?",o:["Му","Гав","Кря"],c:"Му",i:"🥤"},
    {q:"С какой буквы слово Арбуз?",o:["А","Б","О"],c:"А",i:"🍓"},
    {q:"Какая планета наш дом?",o:["Земля","Марс","Луна"],c:"Земля",i:"🍫"},
    {q:"Какое насекомое делает мёд?",o:["Пчела","Муравей","Комар"],c:"Пчела",i:"🍯"},
    {q:"Сколько ног у паука?",o:["8","6","4"],c:"8",i:"🥝"},
    {q:"Сколько будет 3 плюс 2?",o:["5","4","6"],c:"5",i:"🍒"},
    {q:"Из чего состоит радуга?",o:["Из цветов","Из воды","Из облаков"],c:"Из цветов",i:"🌈"},
    {q:"Чем мы слышим?",o:["Ушами","Глазами","Руками"],c:"Ушами",i:"🫐"},
    {q:"Какое время года тёплое?",o:["Лето","Зима","Осень"],c:"Лето",i:"🥥"}
  ]
};

// ====== ОЗВУЧКА (два голоса поочерёдно) ======
let voiceTurn = 0, voices = [];
function loadVoices(){ try{ voices = window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith('ru')); }catch(e){} }
if('speechSynthesis' in window){ loadVoices(); window.speechSynthesis.onvoiceschanged = loadVoices; }
function speak(text){
  try{
    if(!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ru-RU';
    if(voiceTurn === 0){ u.pitch = 1.8; u.rate = 0.95; if(voices[1]) u.voice = voices[1]; }
    else { u.pitch = 1.4; u.rate = 0.9; if(voices[0]) u.voice = voices[0]; }
    window.speechSynthesis.speak(u);
    voiceTurn = 1 - voiceTurn;
  }catch(e){}
}

// ====== ЗВУКИ (создаём только при старте) ======
let audioCtx = null;
function initAudio(){ try{ if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended') audioCtx.resume(); }catch(e){} }
function playTone(f,d,t='sine'){
  try{
    if(!audioCtx) return;
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type=t; o.frequency.value=f; o.connect(g); g.connect(audioCtx.destination);
    g.gain.setValueAtTime(0.2,audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);
    o.start(); o.stop(audioCtx.currentTime+d);
  }catch(e){}
}
function soundCorrect(){ playTone(880,0.15); setTimeout(()=>playTone(1320,0.25),120); }
function soundWrong(){ playTone(200,0.3,'triangle'); }
function soundWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3),i*180)); }

// ====== ЛОГИКА ======
let questions=[], step=0, earned=[], dessertName="", placed=[];
const TOTAL=6;
const screen=document.getElementById('screen');
const shuffle=a=>[...a].sort(()=>Math.random()-0.5);
const pick=a=>a[Math.floor(Math.random()*a.length)];

function startGame(){
  initAudio();
  questions=shuffle(DATA.questions).slice(0,TOTAL);
  step=0; earned=[]; placed=[]; voiceTurn=0;
  dessertName=pick(DATA.desserts);
  showQuestion();
}

function showQuestion(){
  const item=questions[step];
  const opts=shuffle(item.o).map(o=>`<button onclick="answer('${o.replace(/'/g,"")}')">${o}</button>`).join('');
  screen.innerHTML=`
    <div class="progress">Собираем: ${dessertName} — вопрос ${step+1} из ${TOTAL}</div>
    <div class="pantry">🧺 ${earned.join(' ')||'пока пусто'}</div>
    <div class="question">${item.q}</div>
    <div class="options">${opts}</div>
    <button class="sound-btn" onclick="speak('${item.q}')">🔊 Повторить</button>
    <div class="feedback" id="fb"></div>`;
  speak(item.q);
}

function answer(chosen){
  const item=questions[step], fb=document.getElementById('fb');
  if(chosen===item.c){
    earned.push(item.i); soundCorrect();
    const p=pick(DATA.praise); fb.innerHTML=`<span class="pop">${p} ${item.i}</span>`; speak(p);
    step++;
    setTimeout(()=>{ step<TOTAL?showQuestion():showKitchen(); },1600);
  } else { soundWrong(); const h=pick(DATA.hints); fb.textContent=h; speak(h); }
}

function showKitchen(){
  const pantryHtml=earned.map((emo,idx)=>
