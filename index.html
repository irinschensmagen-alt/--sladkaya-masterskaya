<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍰 Сладкая мастерская</title>
<style>
  body { margin:0; font-family:'Comic Sans MS','Segoe UI',sans-serif;
    background:linear-gradient(135deg,#FFD1DC,#B5EAD7,#FFF5BA);
    display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
  .card { background:#fff; border-radius:30px; box-shadow:0 10px 30px rgba(0,0,0,.15);
    padding:30px; max-width:620px; width:100%; text-align:center; }
  h1 { color:#ff7aa2; font-size:26px; }
  .chef { font-size:60px; }
  .question { font-size:22px; margin:20px 0; color:#444; }
  .options button { display:block; width:100%; margin:10px 0; padding:16px; font-size:20px;
    border:none; border-radius:20px; background:#B5EAD7; cursor:pointer; transition:.2s; font-family:inherit; }
  .options button:hover { transform:scale(1.05); background:#9be0c4; }
  .feedback { font-size:20px; margin:15px 0; min-height:28px; color:#ff7aa2; }
  .start-btn,.again-btn { padding:16px 30px; font-size:22px; border:none; border-radius:25px;
    background:#ff9ec3; color:#fff; cursor:pointer; font-family:inherit; margin-top:15px; }
  .progress { font-size:18px; color:#888; }
  .sound-btn { background:#FFF5BA; border:none; border-radius:15px; padding:8px 14px;
    font-size:18px; cursor:pointer; margin-top:10px; font-family:inherit; }
  @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
  .pop { display:inline-block; animation:pop .5s ease; }
  .pantry { display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin:20px 0; min-height:60px; }
  .ingredient { font-size:44px; cursor:pointer; user-select:none; transition:transform .15s; padding:6px; border-radius:15px; }
  .ingredient.taken { opacity:.25; pointer-events:none; }
  .ingredient.selected { background:#ffe0ec; transform:scale(1.2); box-shadow:0 0 0 3px #ff7aa2; }

  .base-wrap { position:relative; width:300px; height:300px; margin:20px auto; }
  .base { position:absolute; inset:0; font-size:230px; line-height:300px;
    display:flex; align-items:center; justify-content:center; user-select:none;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.15)); }
  .decor-layer { position:absolute; inset:0; cursor:crosshair; }
  .decor-layer.hint { box-shadow:inset 0 0 0 3px #ffb3c9; border-radius:50%; }
  .placed-item { position:absolute; font-size:38px; transform:translate(-50%,-50%);
    animation:pop .35s ease; cursor:pointer; user-select:none; }
  @keyframes flame { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-52%) scale(1.15)} }
  .placed-item.candle { animation:flame 0.8s ease-in-out infinite; }

  .cake-text { position:absolute; left:50%; top:64%; transform:translateX(-50%);
    font-size:17px; font-weight:bold; color:#d6336c; white-space:nowrap;
    text-shadow:1px 1px 2px #fff, -1px -1px 2px #fff; pointer-events:none; }

  .hint-text { font-size:15px; color:#999; margin-top:8px; line-height:1.5; }
  .tools { display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin:12px 0; }
  .tools button { font-size:15px; background:#fdf0f5; border:2px solid #ffd0e0;
    border-radius:14px; cursor:pointer; padding:8px 12px; transition:.15s; font-family:inherit; }
  .tools button:hover { background:#ffe0ec; transform:scale(1.05); }
  .tools button.active { border-color:#ff7aa2; background:#ffd0e0; }
  .base-picker { display:flex; justify-content:center; gap:16px; margin:14px 0; }
  .base-picker button { font-size:46px; background:#fdf0f5; border:3px solid transparent;
    border-radius:18px; cursor:pointer; padding:6px 10px; transition:.15s; }
  .base-picker button.active { border-color:#ff7aa2; background:#ffe0ec; transform:scale(1.1); }
  .section-title { font-size:16px; color:#ff7aa2; font-weight:bold; margin:14px 0 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="chef">👨‍🍳</div>
  <h1>Сладкая мастерская</h1>
  <div id="screen"></div>
</div>

<script>
const DATA = {
  desserts: ["Радужный торт 🍰","Волшебное мороженое 🍦","Весёлый кекс 🧁","Фруктовый пирог 🥧","Праздничный торт 🎂"],
  praise: ["Ура! Верно! Держи ингредиент!","Ты умница! Дзинь-дзинь!","Отлично! Как вкусно!","Правильно! Как красиво!"],
  hints: ["Почти! Попробуй ещё разок","Ты близко! Подумай ещё чуть-чуть","Не переживай, попробуем вместе"],
  greetings: ["Приятного аппетита!","С Днём рождения!","С 8 Марта!","С Праздником!","Хорошего дня!"],
  questions: [
    {q:"Кто спит зимой в берлоге?",o:["Медведь","Заяц","Лиса"],c:"Медведь",i:"🍓"},
    {q:"Кто даёт нам молоко?",o:["Корова","Курица","Рыбка"],c:"Корова",i:"🍫"},
    {q:"Что растёт под землёй?",o:["Морковка","Яблоко","Груша"],c:"Морковка",i:"🥝"},
    {q:"Кто говорит «Мяу»?",o:["Кошка","Собака","Утка"],c:"Кошка",i:"🍯"},
    {q:"У кого иголки на спинке?",o:["Ёжик","Заяц","Волк"],c:"Ёжик",i:"🍒"},
    {q:"Какого цвета солнышко?",o:["Жёлтое","Синее","Чёрное"],c:"Жёлтое",i:"🍦"},
    {q:"Какого цвета трава?",o:["Зелёная","Красная","Белая"],c:"Зелёная",i:"🫐"},
    {q:"Сколько лап у котика?",o:["4","2","6"],c:"4",i:"🍪"},
    {q:"На что похоже колесо?",o:["Круг","Квадрат","Треугольник"],c:"Круг",i:"🧁"},
    {q:"Сколько будет 1 плюс 1?",o:["2","3","1"],c:"2",i:"🍌"},
    {q:"Что нужно сказать за подарок?",o:["Спасибо","Пока","Ничего"],c:"Спасибо",i:"🍬"},
    {q:"Кто тянул репку первым?",o:["Дедка","Мышка","Внучка"],c:"Дедка",i:"🍓"},
    {q:"Что кислое?",o:["Лимон","Конфета","Мёд"],c:"Лимон",i:"🍫"},
    {q:"Что холодное?",o:["Мороженое","Чай","Суп"],c:"Мороженое",i:"🍦"},
    {q:"Где растут яблоки?",o:["На дереве","В море","Под землёй"],c:"На дереве",i:"🍎"},
    {q:"У кого длинная шея?",o:["Жираф","Кот","Ёжик"],c:"Жираф",i:"🍯"},
    {q:"Кто царь зверей?",o:["Лев","Заяц","Мышь"],c:"Лев",i:"🍒"},
    {q:"Какая птица не летает?",o:["Пингвин","Воробей","Ласточка"],c:"Пингвин",i:"🫐"},
    {q:"Кто превращается из гусеницы?",o:["Бабочка","Пчела","Муха"],c:"Бабочка",i:"🍭"},
    {q:"Сколько дней в неделе?",o:["7","5","10"],c:"7",i:"🧁"},
    {q:"Какая фигура у крыши домика?",o:["Треугольник","Круг","Овал"],c:"Треугольник",i:"🍦"},
    {q:"Сколько пальцев на руке?",o:["5","4","6"],c:"5",i:"🍑"},
    {q:"Кто помогал Золушке?",o:["Фея","Дракон","Робот"],c:"Фея",i:"🍬"},
    {q:"Как мычит корова?",o:["Му","Гав","Кря"],c:"Му",i:"🥧"},
    {q:"С какой буквы слово Арбуз?",o:["А","Б","О"],c:"А",i:"🍓"},
    {q:"Какая планета наш дом?",o:["Земля","Марс","Луна"],c:"Земля",i:"🍫"},
    {q:"Какое насекомое делает мёд?",o:["Пчела","Муравей","Комар"],c:"Пчела",i:"🍯"},
    {q:"Сколько ног у паука?",o:["8","6","4"],c:"8",i:"🥝"},
    {q:"Сколько будет 3 плюс 2?",o:["5","4","6"],c:"5",i:"🍒"},
    {q:"Что сладкое?",o:["Конфета","Лимон","Перец"],c:"Конфета",i:"🍬"},
    {q:"Чем мы слышим?",o:["Ушами","Глазами","Руками"],c:"Ушами",i:"🫐"},
    {q:"Какое время года тёплое?",o:["Лето","Зима","Осень"],c:"Лето",i:"🍪"}
  ]
};

let voiceTurn=0, voices=[];
function loadVoices(){ try{ voices=window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith('ru')); }catch(e){} }
if('speechSynthesis' in window){ loadVoices(); window.speechSynthesis.onvoiceschanged=loadVoices; }
function speak(text){
  try{ if(!('speechSynthesis' in window))return; window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text); u.lang='ru-RU';
    if(voiceTurn===0){ u.pitch=1.8; u.rate=0.95; if(voices[1])u.voice=voices[1]; }
    else { u.pitch=1.4; u.rate=0.9; if(voices[0])u.voice=voices[0]; }
    window.speechSynthesis.speak(u); voiceTurn=1-voiceTurn;
  }catch(e){}
}

let audioCtx=null;
function initAudio(){ try{ if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)(); if(audioCtx.state==='suspended')audioCtx.resume(); }catch(e){} }
function playTone(f,d,t='sine'){ try{ if(!audioCtx)return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=t;o.frequency.value=f;o.connect(g);g.connect(audioCtx.destination); g.gain.setValueAtTime(0.2,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d); o.start();o.stop(audioCtx.currentTime+d);}catch(e){} }
function soundCorrect(){ playTone(880,0.15); setTimeout(()=>playTone(1320,0.25),120); }
function soundWrong(){ playTone(200,0.3,'triangle'); }
function soundPlace(){ playTone(660,0.1); setTimeout(()=>playTone(990,0.12),70); }
function soundWin(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>playTone(f,0.3),i*180)); }

let questions=[], step=0, earned=[], dessertName="";
let baseEmoji="🎂", mode="fruit", selectedIng=null, cakeText="";
const BASES=["🎂","🧁","🥧","🍰"], TOTAL=6;
const screen=document.getElementById('screen');
const shuffle=a=>[...a].sort(()=>Math.random()-0.5);
const pick=a=>a[Math.floor(Math.random()*a.length)];

function startGame(){
  initAudio();
  questions=shuffle(DATA.questions).slice(0,TOTAL);
  step=0; earned=[]; voiceTurn=0; selectedIng=null; baseEmoji="🎂"; mode="fruit"; cakeText="";
  dessertName=pick(DATA.desserts);
  showQuestion();
}

function showQuestion(){
  const item=questions[step];
  const opts=shuffle(item.o).map(o=>`<button onclick="answer('${o.replace(/'/g,"")}')">${o}</button>`).join('');
  screen.innerHTML=`
    <div class="progress">Собираем: ${dessertName} — вопрос ${step+1} из ${TOTAL}</div>
    <div class="pantry">🧺 ${earned.join(' ')||'пока пусто'}</div>
    <div class="question">${item.q}</div>
    <div class="options">${opts}</div>
    <button class="sound-btn" onclick="speak('${item.q}')">🔊 Повторить</button>
    <div class="feedback" id="fb"></div>`;
  speak(item.q);
}

function answer(chosen){
  const item=questions[step], fb=document.getElementById('fb');
  if(chosen===item.c){
    earned.push(item.i); soundCorrect();
    const p=pick(DATA.praise); fb.innerHTML=`<span class="pop">${p} ${item.i}</span>`; speak(p);
    step++;
    setTimeout(()=>{ step<TOTAL?showQuestion():showKitchen(); },1600);
  } else { soundWrong(); const h=pick(DATA.hints); fb.textContent=h; speak(h); }
}

// ====== КУХНЯ ======
function showKitchen(){
  const basesHtml=BASES.map(b=>`<button onclick="chooseBase('${b}')" class="${b===baseEmoji?'active':''}">${b}</button>`).join('');
  const pantryHtml=earned.map((emo,idx)=>
    `<span class="ingredient" id="ing${idx}" data-emo="${emo}" onclick="selectFruit(${idx})">${emo}</span>`).join('');
  const greetBtns=DATA.greetings.map(g=>`<button onclick="setText('${g}')">${g}</button>`).join('');
  screen.innerHTML=`
    <div class="progress">🎉 Все ингредиенты собраны!</div>
    <h1>Укрась свой десерт красиво! 🎨</h1>

    <div class="section-title">🎂 Выбери основу</div>
    <div class="base-picker">${basesHtml}</div>

    <div class="base-wrap">
      <div class="base" id="base">${baseEmoji}</div>
      <div class="decor-layer" id="decor" onclick="dropOnBase(event)"></div>
      <div class="cake-text" id="caketext"></div>
    </div>

    <div class="section-title">🍓 Ягоды и сладости <span class="hint-text">(нажми ягодку → потом на торт)</span></div>
    <div class="pantry" id="pantry">${pantryHtml}</div>

    <div class="section-title">🕯️ Свечки</div>
    <div class="tools">
      <button id="candleBtn" onclick="selectCandle()">🕯️ Ставить свечки</button>
      <button onclick="clearCandles()">🧹 Убрать свечки</button>
      <span class="hint-text" id="candleCount">Свечек: 0 из 15</span>
    </div>

    <div class="section-title">✍️ Надпись на торте</div>
    <div class="tools">${greetBtns}<button onclick="setText('')">❌ Без надписи</button></div>

    <div class="feedback" id="fb"></div>
    <button class="again-btn" onclick="finishDessert()">Готово! 🍰</button>`;
  speak("Ура! Теперь укрась свой торт! Клади ягодки, ставь свечки и напиши поздравление!");
}

function chooseBase(b){ baseEmoji=b; document.getElementById('base').textContent=b;
  document.querySelectorAll('.base-picker button').forEach(x=>x.classList.toggle('active',x.textContent===b)); soundPlace(); }

function selectFruit(idx){
  const el=document.getElementById('ing'+idx); if(el.classList.contains('taken'))return;
  mode="fruit"; document.getElementById('candleBtn').classList.remove('active');
  document.querySelectorAll('#pantry .ingredient').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected'); selectedIng={idx,emo:el.dataset.emo};
  document.getElementById('decor').classList.add('hint'); speak("Теперь нажми на торт!");
}

function selectCandle(){
  mode="candle"; selectedIng=null;
  document.querySelectorAll('#pantry .ingredient').forEach(e=>e.classList.remove('selected'));
  document.getElementById('candleBtn').classList.add('active');
  document.getElementById('decor').classList.add('hint');
  speak("Ставь свечки! Нажимай на торт!");
}

function countCandles(){ return document.querySelectorAll('#decor .candle').length; }
function updateCandleCount(){ const el=document.getElementById('candleCount'); if(el) el.textContent="Свечек: "+countCandles()+" из 15"; }
function clearCandles(){ document.querySelectorAll('#decor .candle').forEach(c=>c.remove()); updateCandleCount(); soundPlace(); }

function dropOnBase(e){
  const layer=document.getElementById('decor'), r=layer.getBoundingClientRect();
  const x=((e.clientX-r.left)/r.width)*100, y=((e.clientY-r.top)/r.height)*100;

  if(mode==="candle"){
    if(countCandles()>=15){ speak("Уже пятнадцать свечек! Хватит!"); return; }
    const c=document.createElement('span'); c.className='placed-item candle'; c.textContent='🕯️';
    c.style.left=x+'%'; c.style.top=y+'%';
    c.onclick=(ev)=>{ ev.stopPropagation(); c.remove(); updateCandleCount(); soundPlace(); };
    layer.appendChild(c); updateCandleCount(); soundPlace();
    return;
  }

  if(!selectedIng){ speak("Сначала выбери ягодку или свечки!"); return; }
  const it=document.createElement('span'); it.className='placed-item'; it.textContent=selectedIng.emo;
  it.style.left=x+'%'; it.style.top=y+'%';
  it.onclick=(ev)=>{ ev.stopPropagation(); it.remove(); soundPlace(); };
  layer.appendChild(it); soundPlace(); speak("Красиво!");
  const ie=document.getElementById('ing'+selectedIng.idx); ie.classList.add('taken'); ie.classList.remove('selected');
  selectedIng=null; layer.classList.remove('hint');
}

function setText(t){ cakeText=t; const el=document.getElementById('caketext'); if(el) el.textContent=t; soundPlace(); if(t) speak(t); }

function finishDessert(){
  const placed=document.querySelectorAll('#decor .placed-item');
  if(placed.length===0 && !cakeText){
    speak("Укрась торт: положи ягодку, свечку или напиши поздравление!");
    document.getElementById('fb').textContent="Сначала укрась торт 🙂"; return;
  }
  soundWin();
  const decorHtml=[...placed].map(p=>
    `<span class="placed-item ${p.classList.contains('candle')?'candle':''}" style="left:${p.style.left};top:${p.style.top};cursor:default">${p.textContent}</span>`).join('');
  const textHtml=cakeText?`<div class="cake-text">${cakeText}</div>`:'';
  screen.innerHTML=`
    <div class="progress">Твой десерт готов! 🎉</div>
    <div class="base-wrap">
      <div class="base">${baseEmoji}</div>
      <div class="decor-layer">${decorHtml}</div>
      ${textHtml}
    </div>
    <h1>${dessertName}</h1>
    <div class="question">Ты сам украсил десерт!<br>Настоящий кондитер! 👏</div>
    <button class="again-btn" onclick="startGame()">Приготовить ещё! 🍰</button>`;
  speak("Ух ты! Какой красивый праздничный десерт ты украсил сам! Настоящий кондитер!");
}

screen.innerHTML=`
  <div class="question">Привет, маленький кондитер!<br>Отвечай на вопросы и укрась праздничный торт! 🍓🎂🕯️</div>
  <button class="start-btn" onclick="startGame()">Начать игру! ▶️</button>`;
</script>
</body>
</html>
