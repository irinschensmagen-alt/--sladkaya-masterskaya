<style>

    min-height: 100vh; padding: 20px;
  }
  .card {
    background: #fff; border-radius: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,.15);
    padding: 30px; max-width: 520px; width: 100%; text-align: center;
  }
  h1 { color: #ff7aa2; font-size: 28px; margin: 10px 0; }
  .chef { font-size: 60px; }
  .question { font-size: 22px; margin: 20px 0; color: #444; }
  .options button {
    display: block; width: 100%; margin: 10px 0; padding: 16px;
    font-size: 20px; border: none; border-radius: 20px;
    background: #B5EAD7; cursor: pointer; transition: .2s; font-family: inherit;
  }
  .options button:hover { transform: scale(1.05); background: #9be0c4; }
  .feedback { font-size: 20px; margin: 15px 0; min-height: 28px; color: #ff7aa2; }
  .progress { font-size: 18px; color: #888; }
  .start-btn, .again-btn, .sound-btn {
    padding: 14px 26px; font-size: 20px; border: none; border-radius: 25px;
    background: #ff9ec3; color: #fff; cursor: pointer; font-family: inherit; margin-top: 12px;
  }
  .sound-btn { background: #FFF5BA; color: #a67c00; font-size: 18px; padding: 8px 14px; }

  /* ---- Сборка десерта ---- */
  .plate {
    width: 220px; height: 220px; margin: 15px auto; border-radius: 50%;
    background: radial-gradient(circle, #fff 60%, #eee 100%);
    border: 6px dashed #ffb6cf; display: flex; flex-wrap: wrap;
    align-items: center; justify-content: center; gap: 4px; padding: 10px;
    box-shadow: inset 0 4px 12px rgba(0,0,0,.08);
    transition: .2s;
  }
  .plate.over { background: #FFF5BA; transform: scale(1.05); }
  .plate span { font-size: 34px; animation: pop .5s ease; }
  .tray {
    display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
    margin: 15px 0; min-height: 60px;
  }
  .ingredient {
    font-size: 42px; cursor: grab; user-select: none;
    background: #fdf0f5; border-radius: 18px; padding: 6px 10px;
    transition: .15s; box-shadow: 0 3px 6px rgba(0,0,0,.1);
    animation: pop .4s ease;
  }
  .ingredient:hover { transform: scale(1.2) rotate(-5deg); }
  .ingredient:active { cursor: grabbing; }
  .hint-small { font-size: 15px; color: #999; margin-top: 8px; }

  @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.3)} 100%{transform:scale(1)} }
  .pop { display:inline-block; animation: pop .5s ease; }
</style>
</head>
<body>

// ====== ОЗВУЧКА: голоса «девочки» и «мальчика» поочерёдно ======
let voices = [];
let girlVoice = null, boyVoice = null;
let speakerTurn = 0; // 0 = девочка, 1 = мальчик

function loadVoices(){
  voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('ru'));
  // пытаемся найти "детские" или разные голоса
  girlVoice = voices.find(v => /child|kid|girl|дет|Alena|Alyona|Milena|female|женск/i.test(v.name)) || voices[0];
  boyVoice  = voices.find(v => v !== girlVoice) || voices[0];
}
if('speechSynthesis' in window){
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, keepTurn=false){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ru-RU';
  u.rate = 0.9;
  if(speakerTurn === 0){          // ДЕВОЧКА — очень высокий, звонкий
    u.voice = girlVoice; u.pitch = 2.0; u.rate = 0.95;
  } else {                        // МАЛЬЧИК — высокий, но бодрый
    u.voice = boyVoice;  u.pitch = 1.7; u.rate = 1.0;
  }
  window.speechSynthesis.speak(u);
  if(!keepTurn) speakerTurn = 1 - speakerTurn; // чередуем голоса
}

// ====== ЗВУКИ ======
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, dur, type='sine'){
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(audioCtx.destination);
  g.gain.setValueAtTime(0.2,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.start(); o.stop(audioCtx.currentTime+dur);
}
